name: Daily Opportunity Scan

on:
  schedule:
    - cron: '0 6 * * *'   # Her gün 06:00 UTC (09:00 TR saatiyle)
  workflow_dispatch:        # Manuel tetikleme

jobs:
  generate-report:
    name: Generate daily report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate report and save to DB
        run: npx tsx scripts/generate-report.ts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REPORT_API_KEY: ${{ secrets.REPORT_API_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}

  update-competition:
    name: Update competition on previous reports
    runs-on: ubuntu-latest
    needs: generate-report   # Yeni rapor kaydedildikten sonra çalışır
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Update competition data for last 30 days
        run: npx tsx scripts/update-competition.ts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REPORT_API_KEY: ${{ secrets.REPORT_API_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
